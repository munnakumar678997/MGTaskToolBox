name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create app icons
        run: |
          mkdir -p assets/images
          sudo apt-get install -y imagemagick -q
          convert -size 1024x1024 xc:#4F46E5 \
            -fill white -font DejaVu-Sans-Bold -pointsize 200 \
            -gravity center -annotate 0 "MG" \
            assets/images/icon.png
          convert -size 1024x1024 xc:#1A1A2E assets/images/splash.png
          convert -size 1024x1024 xc:#4F46E5 assets/images/adaptive-icon.png
          echo "Icons created:" && ls -la assets/images/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Run Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Find APK
        run: find android -name "*.apk" -type f

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MGTaskToolBox-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-build-${{ github.run_number }}
          name: MGTaskToolBox v1.0 (Build ${{ github.run_number }})
          body: |
            ## MGTaskToolBox 🛠️ — APK Ready!
            **by Munna Agent (MG)**

            ### Tools:
            - 🧮 Calculator
            - 📐 Unit Converter
            - ✍️ Text Tools
            - 🔐 Password Generator

            ### Install kaise karein:
            1. Neeche **app-debug.apk** download karo
            2. Phone mein Settings → Security → **Unknown Sources** ON karo
            3. APK tap karke install karo ✅
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
